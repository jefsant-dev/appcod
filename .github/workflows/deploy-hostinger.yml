name: Deploy (Hostinger) - PHP (overwrite only)

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug checked-out revision
        run: |
          echo "GITHUB_SHA=${GITHUB_SHA}"
          git log -1 --oneline
          echo "=== LOCAL INDEX.HTML (HEAD) ==="
          sed -n '1,40p' index.html

      - name: Build deploy package (exclude unnecessary files)
        run: |
          rm -rf .deploy-package
          mkdir -p .deploy-package
          rsync -av \
            --exclude='.deploy-package/' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='node_modules/' \
            --exclude='vendor/' \
            --exclude='storage/logs/' \
            ./ ./.deploy-package/

      - name: Upload files to server (SCP overwrite, no delete)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port: ${{ secrets.SSH_PORT }}

          # Envia tudo do repo para dentro do DEPLOY_PATH
          source: ".deploy-package/"
          target: /home/u986889441/domains/appcod.com.br/public_html
          strip_components: 1

          # Importante: sobrescreve arquivos com mesmo nome
          overwrite: true

          # Importante: NÃO remove nada no servidor
          rm: false

      - name: Post-deploy commands (optional)
        env:
          POST_DEPLOY: ${{ secrets.POST_DEPLOY }}
        if: ${{ env.POST_DEPLOY != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /home/u986889441/domains/appcod.com.br/public_html
            ${{ env.POST_DEPLOY }}

      - name: Verify deployed files on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /home/u986889441/domains/appcod.com.br/public_html
            echo "=== DEPLOY DIR ==="
            pwd
            echo "=== FILES (TOP) ==="
            ls -la | sed -n '1,80p'
            echo "=== INDEX.HTML (HEAD) ==="
            if [ -f index.html ]; then
              stat index.html || true
              sed -n '1,40p' index.html
            else
              echo "index.html NOT FOUND"
            fi
            echo "=== INDEX.PHP (HEAD) ==="
            if [ -f index.php ]; then
              stat index.php || true
              sed -n '1,40p' index.php
            else
              echo "index.php NOT FOUND"
            fi
